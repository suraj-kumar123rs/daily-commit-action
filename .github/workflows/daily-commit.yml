name: Daily Automated Commit

on:
  schedule:
    - cron: "30 2 * * *"   # runs daily at 02:30 UTC
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Daily commit by 23f2004929@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date)" > daily-log.txt
          git config user.name "github-actions"
          git config user.email "23f2004929@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily commit"
          git push
